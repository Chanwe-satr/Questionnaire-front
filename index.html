<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>课程咨询登记</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial,sans-serif;background:#f5f7fb;padding:16px}
    .container{max-width:560px;margin:0 auto;background:#fff;padding:20px;border-radius:14px;box-shadow:0 6px 18px rgba(0,0,0,.08)}
    h2{text-align:center;margin:8px 0 16px}
    label{display:block;margin-top:14px;font-weight:600}
    input{width:100%;padding:14px;margin-top:8px;border:1px solid #d1d5db;border-radius:10px;font-size:16px}
    button{width:100%;padding:16px;margin-top:22px;background:#2563eb;color:white;border:none;border-radius:12px;font-size:18px;cursor:pointer}
  </style>
</head>
<body>
  <div class="container">
    <h2>课程咨询登记</h2>
    <form id="leadForm">
      <label>孩子姓名</label>
      <input type="text" name="child_name" required placeholder="请输入"/>

      <label>孩子年龄</label>
      <input type="number" name="child_age" required min="2" max="20" placeholder="例如 9" />

      <label>年级</label>
      <input type="text" name="grade" required placeholder="例如 三年级"/>

      <label>家长手机号</label>
      <input type="tel" name="parent_phone" required placeholder="请输入"/>

      <label>推荐人</label>
      <input type="text" name="referrer" placeholder="选填"/>

      <label>推荐老师</label>
      <input type="text" name="ref_teacher" placeholder="选填"/>

      <button type="submit">提交信息</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('leadForm');
    const API_URL = `http://117.72.44.108:8000/api/lead`;

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (res.ok) {
          alert('✅ 信息提交成功，我们会尽快联系您！');
          form.reset();
        } else {
          alert('❌ 提交失败，请稍后再试');
        }
      } catch (err) {
        alert('❌ 网络异常，请检查网络');
      }
    });
  </script>
</body>
</html>
