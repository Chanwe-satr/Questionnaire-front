<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <title>课程咨询登记</title>
  <style>
    :root { --primary:#2563eb; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial,sans-serif; background:#f5f7fb; margin:0; padding:16px; }
    .container { max-width:560px; margin:0 auto; background:#fff; padding:20px; border-radius:14px; box-shadow:0 6px 18px rgba(0,0,0,0.08); }
    h2 { text-align:center; margin:8px 0 16px; font-size:20px; }
    label { display:block; margin-top:14px; font-weight:600; }
    input, select { width:100%; padding:14px; margin-top:8px; border:1px solid #d1d5db; border-radius:10px; font-size:16px; }
    input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(37,99,235,.15); }
    button { width:100%; padding:16px; margin-top:22px; background:var(--primary); color:white; border:none; border-radius:12px; font-size:18px; cursor:pointer; }
    button:active { transform: translateY(1px); }
    .success { color:#16a34a; text-align:center; margin-top:12px; min-height:22px; }
    .error { color:#dc2626; text-align:center; margin-top:12px; min-height:22px; }
    @media (min-width: 768px){ body{ padding:32px;} }
  </style>
</head>
<body>
  <div class="container">
    <h2>课程咨询登记</h2>
    <form id="leadForm">
      <label>孩子姓名</label>
      <input type="text" name="child_name" required placeholder="请输入孩子姓名" />

      <label>孩子年龄</label>
      <input type="number" name="child_age" required min="3" max="18" placeholder="如：9" />

      <label>年级</label>
      <input type="text" name="grade" placeholder="如：三年级" required />

      <label>家长手机号</label>
      <input type="tel" name="parent_phone" inputmode="numeric" pattern="[0-9+\- ]{6,}" required placeholder="请输入联系电话" />

      <label>推荐人</label>
      <input type="text" name="referrer" placeholder="家长或学生姓名（选填）" />

      <label>推荐老师</label>
      <input type="text" name="ref_teacher" placeholder="老师姓名（选填）" />

      <button type="submit">提交信息</button>
    </form>
    <div class="success" id="msg"></div>
    <div class="error" id="err"></div>
  </div>

  <script>
    const form = document.getElementById('leadForm');
    const msg = document.getElementById('msg');
    const err = document.getElementById('err');

    // 使用同源地址，避免手机端 http/https、跨域、localhost 问题
    const API_URL = `http://117.72.44.108:8000/api/lead`;

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = '';
      err.textContent = '';

      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (res.ok) {
          msg.textContent = '提交成功，我们会尽快联系您！';
          form.reset();
        } else {
          const t = await res.text();
          err.textContent = '提交失败：' + (t || res.status);
        }
      } catch (e) {
        err.textContent = '网络或证书问题，请确认使用 HTTPS 并与后端同域部署';
      }
    });
  </script>
</body>
</html>
